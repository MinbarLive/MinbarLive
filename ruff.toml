# Ruff configuration for MinbarLive
# https://docs.astral.sh/ruff/
# Note: ruff.toml uses top-level sections, NOT the [tool.ruff] prefix
# (that prefix is only for pyproject.toml).

target-version = "py310"
line-length = 88

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[lint.per-file-ignores]
# Legacy findings that predate CI (baselined 2026-07) so the lint gate can
# start green. These files are still checked for every other rule, and all
# other files are checked for these rules. Remove an entry once it is fixed.
# subtitle_window.py: imports sit below the arabic_reshaper try-block and the
# module-level regex constants, which is deliberate — fixing it is a refactor.
"gui/subtitle_window.py" = ["I001", "E402"]
"gui/dropdown.py" = ["E741"]

[lint.isort]
known-first-party = ["audio", "gui", "translation", "utils", "config", "version"]

[format]
quote-style = "double"
indent-style = "space"
