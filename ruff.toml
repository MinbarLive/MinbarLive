# Ruff configuration for MinbarLive
# https://docs.astral.sh/ruff/
# Note: ruff.toml uses top-level sections, NOT the [tool.ruff] prefix
# (that prefix is only for pyproject.toml).

target-version = "py310"
line-length = 88

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[lint.isort]
known-first-party = ["audio", "gui", "translation", "utils", "config", "version"]

[format]
quote-style = "double"
indent-style = "space"
