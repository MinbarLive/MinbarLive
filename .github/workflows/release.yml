name: Release

# Builds the Windows EXE. Pushing a `v*` tag also publishes it as a release
# asset; `workflow_dispatch` builds without publishing, for testing the build
# itself. A second job builds an experimental Linux binary, which is kept as a
# workflow artifact and never attached to the release — see docs/ci.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# `contents: write` is needed to create the release and upload the asset.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetched selectively below; `lfs: true` would pull all three
          # tracked files including the 418 MB raw JSON, which the EXE does
          # not bundle. See "Git LFS" in docs/ci.md.
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Runs before the LFS pull so the suite sees the same pointer stubs the
      # `test` job in ci.yml does: identical conditions, no surprise failures
      # from real embeddings being present.
      - name: Test
        run: python -m pytest -q

      - name: Check the tag matches version.py
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(python -c "from version import __version__; print(__version__)")
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match version.py ($ver)."
            echo "The in-app update check compares release tags against the built-in"
            echo "version, so a mismatch makes it prompt users forever or never."
            exit 1
          fi

      # Only the two embedding matrices the spec bundles (~182 MB), not the
      # 418 MB quran_embeddings.json, which a.datas filters out of the EXE.
      - name: Fetch embedding matrices from LFS
        run: git lfs pull --include="data/embeddings/*.npz"

      # An exhausted LFS bandwidth quota leaves ~130-byte pointer stubs behind
      # without failing the pull. The EXE would build fine and ship with Quran
      # verse matching silently dead, so fail here instead.
      - name: Verify the matrices are real
        shell: bash
        run: |
          for f in data/embeddings/quran_embeddings_openai.npz \
                   data/embeddings/quran_embeddings_gemini.npz; do
            size=$(stat -c%s "$f")
            if [ "$size" -lt 1000000 ]; then
              echo "::error::$f is an LFS pointer stub ($size bytes), not the matrix."
              exit 1
            fi
            echo "$f: $size bytes"
          done

      # Handed to build-linux rather than letting that job run its own
      # `git lfs pull`: the two matrices are ~182 MB and the free LFS
      # allowance is 1 GB of bandwidth per month, so pulling them once per
      # release instead of twice is the difference between five builds a
      # month and two. compression-level 0 because .npz is already zipped.
      - name: Share the matrices with the Linux job
        uses: actions/upload-artifact@v4
        with:
          name: embeddings
          path: data/embeddings/*.npz
          compression-level: 0
          retention-days: 1

      - run: pyinstaller MinbarLive.spec

      - name: Verify the EXE
        shell: bash
        run: |
          size=$(stat -c%s dist/MinbarLive.exe)
          echo "dist/MinbarLive.exe: $size bytes"
          if [ "$size" -lt 100000000 ]; then
            echo "::error::EXE is only $size bytes, the data/ bundle is missing."
            exit 1
          fi

      - name: Checksum
        shell: bash
        run: cd dist && sha256sum MinbarLive.exe | tee SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: MinbarLive-exe
          path: |
            dist/MinbarLive.exe
            dist/SHA256SUMS.txt

      # The asset must keep the exact name MinbarLive.exe and the release must
      # be the "latest" one: the website's download buttons and the in-app
      # update check both go through releases/latest/download/MinbarLive.exe.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"

          # Always the first thing in the release description. `gh` prepends
          # --notes-file to whatever --generate-notes produces, so the
          # changelog follows underneath.
          cat > notes.md <<'EOF'
          **Windows**
          - "MinbarLive.exe" herunterladen
          - Download "MinbarLive.exe"
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            # Release already exists, e.g. created through the web UI. Prepend
            # the block unless it is already there, never overwriting notes
            # somebody wrote by hand.
            body=$(gh release view "$tag" --json body -q .body)
            if ! printf '%s' "$body" | grep -qF 'Download "MinbarLive.exe"'; then
              printf '\n%s\n' "$body" >> notes.md
              gh release edit "$tag" --notes-file notes.md
            fi
          else
            gh release create "$tag" \
              --title "MinbarLive $tag" \
              --notes-file notes.md \
              --generate-notes \
              --latest
          fi

          gh release upload "$tag" \
            dist/MinbarLive.exe dist/SHA256SUMS.txt --clobber

  # EXPERIMENTAL Linux build. Verified on a real Linux desktop (2026-07), so the
  # AppImage is now attached to tagged releases (the publish step at the end of
  # this job) - but it is still labelled experimental: several features are
  # Windows-only there (the OBS-visible borderless overlay, transparent static
  # mode, loopback capture), and the OS keychain needs a Secret Service backend
  # or it falls back to plaintext for OpenAI / session-only for every other
  # provider. See docs/ci.md.
  build-linux:
    needs: build
    # NOT ubuntu-latest. A PyInstaller binary only starts on glibc at least as
    # new as the one it was built against, so building on 24.04 (glibc 2.39)
    # would exclude Debian 12, Ubuntu 22.04 and everything older. 22.04
    # (glibc 2.35) is the oldest runner GitHub still provides; if it is
    # retired, build inside a manylinux container rather than moving up.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # tk: setup-python's interpreter links against libtk8.6/libtcl8.6.
      # libportaudio2: the Linux sounddevice wheel does not bundle PortAudio,
      # so the spec bundles the system copy. xvfb: for the smoke launch below.
      - name: System libraries
        run: sudo apt-get update && sudo apt-get install -y tk libportaudio2 xvfb

      - run: pip install -r requirements.txt

      # The matrices the `build` job already pulled from LFS. They overwrite
      # the pointer stubs checkout left behind.
      - uses: actions/download-artifact@v4
        with:
          name: embeddings
          path: data/embeddings

      - name: Verify the matrices are real
        run: |
          for f in data/embeddings/quran_embeddings_openai.npz \
                   data/embeddings/quran_embeddings_gemini.npz; do
            size=$(stat -c%s "$f")
            if [ "$size" -lt 1000000 ]; then
              echo "::error::$f is an LFS pointer stub ($size bytes), not the matrix."
              exit 1
            fi
            echo "$f: $size bytes"
          done

      - run: pyinstaller MinbarLive.spec

      - name: Verify the binary
        run: |
          file dist/MinbarLive
          size=$(stat -c%s dist/MinbarLive)
          echo "dist/MinbarLive: $size bytes"
          if [ "$size" -lt 100000000 ]; then
            echo "::error::Binary is only $size bytes, the data/ bundle is missing."
            exit 1
          fi

      # A startup crash — a shared library the bundle missed, an X11 request
      # the toolkit rejects — exits within seconds. A healthy start sits in
      # the onboarding wizard until `timeout` kills it, so exit 124 is the
      # success case and anything else means it died on its own.
      - name: Smoke-launch the binary
        run: |
          set +e
          xvfb-run -a timeout 30 ./dist/MinbarLive
          code=$?
          set -e
          if [ "$code" -ne 124 ]; then
            echo "::error::MinbarLive exited with $code instead of staying up for 30s."
            exit 1
          fi
          echo "Stayed up for 30s."

      - name: Package AppImage
        run: bash packaging/build-appimage.sh

      # Deliberately NOT setting APPIMAGE_EXTRACT_AND_RUN, and the runner has no
      # FUSE installed: a clean start therefore proves the embedded uruntime
      # (FUSE-less) runtime works - i.e. an end user can double-click the
      # AppImage on a stock modern distro without installing libfuse2. A healthy
      # start sits in the onboarding wizard until timeout kills it (exit 124).
      - name: Smoke-launch the AppImage (no FUSE)
        run: |
          size=$(stat -c%s dist/MinbarLive-x86_64.AppImage)
          echo "dist/MinbarLive-x86_64.AppImage: $size bytes"
          if [ "$size" -lt 100000000 ]; then
            echo "::error::AppImage is only $size bytes, the bundle is missing."
            exit 1
          fi
          set +e
          xvfb-run -a timeout 30 ./dist/MinbarLive-x86_64.AppImage
          code=$?
          set -e
          if [ "$code" -ne 124 ]; then
            echo "::error::AppImage exited with $code (expected 124). The FUSE-less runtime may not be working."
            exit 1
          fi
          echo "AppImage stayed up for 30s without FUSE."

      # The AppImage is the only shipped Linux artifact: it wraps this same
      # binary and adds double-click-run + menu integration, so uploading the
      # bare binary too would just double the artifact size for no benefit. The
      # binary is still built and smoke-launched above as a base validation.
      - name: Checksum
        run: cd dist && sha256sum MinbarLive-x86_64.AppImage | tee SHA256SUMS-linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: MinbarLive-linux
          path: |
            dist/MinbarLive-x86_64.AppImage
            dist/SHA256SUMS-linux.txt

      # Attach the experimental Linux AppImage to the release (tag builds only).
      # The Windows `build` job is a dependency and creates the release first,
      # so it already exists here - just upload alongside MinbarLive.exe.
      - name: Publish the AppImage to the release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/MinbarLive-x86_64.AppImage dist/SHA256SUMS-linux.txt --clobber

  # EXPERIMENTAL macOS build. Kept as a workflow artifact only and NEVER attached
  # to a release yet — exactly how the Linux build started before it was verified
  # on real hardware. It is UNSIGNED and UN-NOTARIZED, so Gatekeeper blocks it on
  # first launch (right-click → Open to run once). Apple Silicon (arm64) only; it
  # will not run on Intel Macs. Several features are Windows-only there (the
  # OBS-visible borderless overlay, transparent static mode, loopback capture).
  # See docs/ci.md. Promote to a release asset only after a real Mac verifies it.
  #
  # MANUAL ONLY: this job does NOT run on a tag push / release — it is gated to
  # workflow_dispatch so an unverified, users-can't-use-it-yet .app never turns a
  # release run red or costs release CI time. Build/test it on demand from
  # Actions → Release → Run workflow. Remove this `if` when the .app is signed,
  # notarized and verified and is ready to ship on releases (issue tracked).
  build-macos:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    # arm64. macos-14 is Apple Silicon; use it for a native, fast build. A single
    # x86_64 job (macos-13) would also cover Apple Silicon via Rosetta, but the
    # artifact is labelled arm64 to make the limitation explicit rather than
    # implying it is universal.
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # The matrices the `build` job already pulled from LFS. They overwrite the
      # pointer stubs checkout left behind (saves a second LFS pull — see the
      # note in the `build` job).
      - uses: actions/download-artifact@v4
        with:
          name: embeddings
          path: data/embeddings

      # macOS `stat` differs from GNU (`-f%z` not `-c%s`), so use `wc -c`, which
      # is portable across both this job and the Linux one's tooling.
      - name: Verify the matrices are real
        run: |
          for f in data/embeddings/quran_embeddings_openai.npz \
                   data/embeddings/quran_embeddings_gemini.npz; do
            size=$(wc -c < "$f")
            if [ "$size" -lt 1000000 ]; then
              echo "::error::$f is an LFS pointer stub ($size bytes), not the matrix."
              exit 1
            fi
            echo "$f: $size bytes"
          done

      # Produces both dist/MinbarLive (the one-file binary) and
      # dist/MinbarLive.app (the BUNDLE wrapper — see MinbarLive.spec).
      - run: pyinstaller MinbarLive.spec

      - name: Verify the .app bundle
        run: |
          test -d dist/MinbarLive.app || { echo "::error::MinbarLive.app was not produced."; exit 1; }
          bin="dist/MinbarLive.app/Contents/MacOS/MinbarLive"
          size=$(wc -c < "$bin")
          echo "$bin: $size bytes"
          if [ "$size" -lt 100000000 ]; then
            echo "::error::Bundled binary is only $size bytes, the data/ bundle is missing."
            exit 1
          fi
          # The mic-usage string is REQUIRED — without it macOS hard-kills the app
          # the moment it opens an input stream (TCC). Fail if the spec did not
          # wire it into Info.plist.
          /usr/libexec/PlistBuddy -c 'Print :NSMicrophoneUsageDescription' \
            dist/MinbarLive.app/Contents/Info.plist \
            || { echo "::error::NSMicrophoneUsageDescription missing from Info.plist."; exit 1; }

      # `ditto` is the macOS-correct archiver — it preserves the bundle's symlinks
      # and permissions where `zip` would mangle them. --keepParent keeps the
      # MinbarLive.app/ top level inside the archive.
      - name: Package the .app
        run: ditto -c -k --keepParent dist/MinbarLive.app dist/MinbarLive-macos-arm64.zip

      - name: Checksum
        run: cd dist && shasum -a 256 MinbarLive-macos-arm64.zip | tee SHA256SUMS-macos.txt

      # Uploaded BEFORE the smoke launch so the artifact survives even if the
      # (best-effort, non-fatal) GUI launch below cannot start on the runner.
      - uses: actions/upload-artifact@v4
        with:
          name: MinbarLive-macos
          path: |
            dist/MinbarLive-macos-arm64.zip
            dist/SHA256SUMS-macos.txt

      # Best-effort only (continue-on-error): whether a Tkinter GUI can start on
      # a hosted macOS runner's session is not something this project has yet
      # verified, so an early exit is reported as a warning, not a build failure.
      # macOS has no `timeout`, so launch in the background and kill after a grace
      # period; exiting on its own before then means it crashed at startup.
      - name: Smoke-launch (best effort)
        continue-on-error: true
        run: |
          ./dist/MinbarLive >/tmp/mac_smoke.log 2>&1 &
          pid=$!
          sleep 25
          if kill -0 "$pid" 2>/dev/null; then
            echo "Stayed up for 25s."
            kill "$pid" 2>/dev/null || true
          else
            wait "$pid"; code=$?
            echo "::warning::MinbarLive exited early with $code — see log below."
            cat /tmp/mac_smoke.log || true
          fi
